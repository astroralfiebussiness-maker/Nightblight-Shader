# NightBlight Shader Pack - Iris Configuration\n# This is the main configuration file for NightBlight\n\n# ========================================\n# IRIS SHADER OPTIONS\n# ========================================\n\n# Render targets\nRGBA=true\nRGB8=true\nRGBA16=true\nRGBA32F=true\n\n# Use transparency\nAlphaTest=true\nTransparent=true\n\n# Performance\nFPS=60\nRenderScale=1.0\n\n# ========================================\n# SHADER OPTIONS\n# ========================================\n\n# Sun Brightness\n# slider: -2 2 0.1 1.0\nSun_Brightness=1.0\n\n# Moon Brightness\n# slider: 0 1 0.1 0.6\nMoon_Brightness=0.6\n\n# Ambient Light Strength\n# slider: 0 1 0.1 0.3\nAmbient_Strength=0.3\n\n# Night Ambient\n# slider: 0 0.5 0.05 0.2\nNight_Ambient=0.2\n\n# Star Intensity\n# slider: 0 2 0.1 1.2\nStar_Intensity=1.2\n\n# Bloom Strength\n# slider: 0 2 0.1 1.0\nBloom_Strength=1.0\n\n# Saturation\n# slider: 0.5 1.5 0.1 1.0\nSaturation=1.0\n\n# Wave Height (Water)\n# slider: 0.1 1.0 0.1 0.5\nWave_Height=0.5\n\n# Eye Adaptation Speed\n# slider: 0.1 2.0 0.1 1.0\nEye_Adaptation=1.0\n\n# Moonveil Effect Strength\n# slider: 0 1 0.1 0.8\nMoonveil_Strength=0.8\n\n# ========================================\n# TEXTURE SETTINGS\n# ========================================\n\nTexMipBias=-0.5\nTexMinFilter=LINEAR\nTexMagFilter=LINEAR\n\n# ========================================\n# SHADOW SETTINGS\n# ========================================\n\nshadow.distance=128\nshadow.resolution=1024\nshadow.map.resolution=1024\n\n# ========================================\n# GBUFFER SETTINGS\n# ========================================\n\n# Render target format configuration\nGBUFFER_0=RGBA8\nGBUFFER_1=RGBA8\nGBUFFER_2=RGBA8\n\n# ========================================\n# COMPOSITE SETTINGS\n# ========================================\n\ncomposite.quality=1\ncomposite0.enabled=true\ncomposite1.enabled=false\n\n# ========================================\n# LIGHTING MODE\n# ========================================\n\nlighting.mode=deferred\n\n# ========================================\n# DEBUG OPTIONS\n# ========================================\n\nDebug=false\n"