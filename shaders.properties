# NightBlight Shader Pack Configuration
# Version 1.0

# Screen Resolution
screen.width=1920
screen.height=1080

# Render Distance
renderDistance=64

# Shadow Settings
shadow.distance=128.0
shadow.map.resolution=2048

# Bloom Settings
bloom.strength=1.0
bloom.threshold=0.8
bloom.samples=8

# Ambient Occlusion
ao.enabled=true
ao.radius=2.0
ao.strength=0.7

# Temporal Anti-Aliasing
taa.enabled=true
taa.strength=0.8

# Performance Presets
# 0 = Low, 1 = Medium, 2 = High, 3 = Ultra
performance.preset=1

# Night-specific Settings
night.brightness=0.4
night.moonBrightness=0.6
night.starIntensity=1.2
night.ambientLight=0.2

# Day-specific Settings  
day.sunBrightness=1.0
day.skyBrightness=1.0
day.saturation=1.0

# Weather Effects
rain.ripples=true
rain.refraction=true
storm.volumetricFog=true

# Signature Effects
effect.moonveil=true
effect.starlightReflections=true
effect.nightPulse=true
effect.dawnAwakening=true
effect.twilightBloom=true
